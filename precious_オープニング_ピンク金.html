<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>precious オープニング（元動画ベース・ピンク）</title>
<style>
:root{--paper:#fff;--ink:#151515}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{
  min-width:320px;
  overflow:hidden;
  background:var(--paper);
  color:var(--ink);
  font-family:Arial,"Helvetica Neue",sans-serif;
}
.opening{
  position:fixed;
  inset:0;
  overflow:hidden;
  background:var(--paper);
}
.main-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}
.brand{
  position:fixed;
  z-index:5;
  top:49px;
  left:49px;
  width:31px;
  filter:hue-rotate(277deg) saturate(2) contrast(1.14) brightness(1.06);
}
.menu-lines{
  position:fixed;
  z-index:5;
  left:49px;
  top:348px;
  width:36px;
  height:26px;
  display:grid;
  align-content:space-between;
}
.menu-lines span{
  display:block;
  height:2px;
  background:var(--ink);
}
.scroll{
  position:fixed;
  z-index:5;
  left:50%;
  bottom:0;
  width:1px;
  height:76px;
  background:var(--ink);
  transform:translateX(-50%);
}
.scroll::before{
  content:"";
  position:absolute;
  left:-2.5px;
  top:0;
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--ink);
  animation:circlemove 2s ease-in-out infinite,circlefade 2s ease-out infinite;
}
.scroll span{
  position:absolute;
  left:10px;
  bottom:30px;
  color:var(--ink);
  font-size:12px;
  line-height:1;
  letter-spacing:.06em;
  text-transform:uppercase;
  writing-mode:vertical-lr;
}
@keyframes circlemove{0%{top:0}100%{top:76px}}
@keyframes circlefade{0%{opacity:0}50%{opacity:1}80%{opacity:.9}100%{opacity:0}}
@media (max-width:767px){
  .brand{top:30px;left:24px;width:29px}
  .menu-lines{left:24px;top:47%;width:34px}
}
</style>
</head>
<body>
<div class="opening" id="opening">
  <video class="main-video" id="mainVideo" autoplay muted playsinline preload="auto">
    <source src="videos/opening_precious_pink_gradient.mp4" type="video/mp4">
  </video>
  <img class="brand" src="https://precious.ne.jp/wp-content/themes/precious/assets/images/common/logo.png" alt="precious">
  <div class="menu-lines" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="scroll" aria-hidden="true"><span>scroll</span></div>
</div>
</body>
</html>
